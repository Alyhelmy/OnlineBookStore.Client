<header class="navbar">
  <div class="navbar-inner">
    <a routerLink="/books" class="brand">
      <span class="brand-icon" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/>
          <path d="M12 6v14" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="brand-text">Online Book Store</span>
    </a>

    

    <nav class="nav-links" aria-label="Primary">
      <a routerLink="/books" routerLinkActive="active">Books</a>
      <a routerLink="/cart" class="cart-link" routerLinkActive="active">
        🛒 Cart 
       <!-- @if ((cartCount$ | async)! > 0) {
          <span class="cart-badge">{{ cartCount$ | async }}</span>
      } -->
      </a>

      @if (authService.isLoggedIn()) {
        <a routerLink="/orders" routerLinkActive="active">My Orders</a>
        @if (authService.isAdmin()) {
          <a routerLink="/admin/orders" routerLinkActive="active">Admin Orders</a>
          <a routerLink="/admin/books" routerLinkActive="active">Admin Books</a>
          <a routerLink="/admin/users" routerLinkActive="active">Admin Users</a>
        }
        <button type="button" class="btn-outline" (click)="logout()">Logout</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active">Login</a>
        <a routerLink="/register" class="cta-register" routerLinkActive="active">Register</a>
      }
    </nav>
  </div>
</header>
